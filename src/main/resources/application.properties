spring.application.name=Smart_Park
server.port=8080
server.address=0.0.0.0
spring.datasource.url=jdbc:mysql://localhost:3306/Smart_Park?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

#  当HTTP状态码为4xx时直接抛出异常
spring.mvc.throw-exception-if-no-handler-found=true
#  关闭默认的静态资源路径映射
spring.web.resources.add-mappings=false

# JWT配置
jwt.secret=smart-park-jwt-secret-key-2024-11-30
jwt.expiration=3600000

# MyBatis-Plus配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.syan.smart_park.entity
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.global-config.db-config.version-field=version

# 日志配置
logging.level.com.smart_park_parking_management_system.controller.ResourceController=DEBUG

# 微信小程序配置
wechat.miniapp.app-id=
wechat.miniapp.app-secret=
wechat.miniapp.login-url=https://api.weixin.qq.com/sns/jscode2session?appid=%s&secret=%s&js_code=%s&grant_type=authorization_code

# 微信 App 配置
wechat.app.app-id=
wechat.app.app-secret=
wechat.app.login-url=https://api.weixin.qq.com/sns/jscode2session?appid=%s&secret=%s&js_code=%s&grant_type=authorization_code
